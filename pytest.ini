[pytest]
# Repo-root config so `pytest` collects every suite in one run.
#
# `backend/tests/` and `detection/tests/` are both packages literally named
# `tests`. Under pytest's default "prepend" import mode the second one collected
# collides with the first and fails with "No module named tests.<x>". importlib
# mode gives each module a unique fully-qualified name, so both suites coexist.
#
# Individual suites still run on their own (backend/pytest.ini keeps its own
# settings when you invoke pytest from within backend/).
addopts = --import-mode=importlib
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

testpaths =
    detection/tests
    backend/tests

# backend/venv is a committed Windows virtualenv; .venv-test is the local
# throwaway runner. Neither should ever be collected.
norecursedirs =
    backend/venv
    .venv-test
    node_modules
    frontend
    *.egg-info
